# ═══════════════════════════════════════════════════════════════════════════════
# TubePlanner - Cloud Build Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Deploy to Google Cloud Run
# ═══════════════════════════════════════════════════════════════════════════════

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tubeplanner:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tubeplanner:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tubeplanner:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tubeplanner:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'tubeplanner'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tubeplanner:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300s'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--set-secrets'
      - 'AUTH_SECRET=AUTH_SECRET:latest'
      - '--set-secrets'
      - 'ENCRYPTION_KEY=ENCRYPTION_KEY:latest'
      - '--set-secrets'
      - 'GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest'
      - '--set-secrets'
      - 'GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest'

# Substitution variables
substitutions:
  _REGION: 'us-central1'
  _NEXT_PUBLIC_APP_URL: 'https://tubeplanner.yourdomain.com'

# Images to push
images:
  - 'gcr.io/$PROJECT_ID/tubeplanner:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/tubeplanner:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
